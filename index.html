const DATA = {"FONTS": "", "T": {"bg": "#0C1220", "surface": "#131B2E", "surfHi": "#1A2540", "border": "#1F2E4A", "borderHi": "#2A3F62", "accent": "#F5A623", "acBg": "rgba(245,166,35,0.1)", "acBd": "rgba(245,166,35,0.28)", "ok": "#34D399", "okBg": "rgba(52,211,153,0.08)", "okBd": "rgba(52,211,153,0.28)", "err": "#F87171", "errBg": "rgba(248,113,113,0.08)", "errBd": "rgba(248,113,113,0.28)", "blue": "#60A5FA", "bluBg": "rgba(96,165,250,0.08)", "bluBd": "rgba(96,165,250,0.22)", "purple": "#A78BFA", "purBg": "rgba(167,139,250,0.08)", "purBd": "rgba(167,139,250,0.22)", "txt": "#E2E8F4", "txtMid": "#94A3C0", "txtLo": "#4A5E80"}, "ROLES": [{"id": "analyst", "label": "Vendor Operations Analyst", "abbr": "VOA", "color": "#60A5FA", "desc": "You receive and triage vendor administrative requests"}, {"id": "procurement", "label": "Regional Procurement Lead", "abbr": "RPL", "color": "#A78BFA", "desc": "You validate documentation and manage change requests"}, {"id": "vendorData", "label": "Vendor Data Management", "abbr": "VDM", "color": "#34D399", "desc": "You run risk screening and approve vendor updates"}, {"id": "finance", "label": "Finance Operations Manager", "abbr": "FOM", "color": "#F5A623", "desc": "You authorise and release payment batches"}, {"id": "security", "label": "Security & Anti-Fraud", "abbr": "SAF", "color": "#F87171", "desc": "You design verification protocols and own escalation paths"}, {"id": "general", "label": "General Organisational Learner", "abbr": "GEN", "color": "#E2E8F4", "desc": "You are outside the incident roles and want the core verification approach for similar workflow risks"}], "MODS": [{"id": 0, "act": "Act I", "title": "The Plausible Beginning", "subtitle": "Monday morning. An email arrives.", "learningObjective": "Surface consistency is a plausibility signal — not an authentication result", "triggerFormula": {"when": "A supplier bank-coordinate change request arrives through formal channels", "notice": "Formal style, correct identifiers, and familiar names confirm the request looks right — not that it is genuine", "action": "Flag for enhanced verification by category — not by how convincing the documentation appears"}, "roleShift": {"analyst": {"moment": "At intake, a supplier bank-coordinate change request arrives with formal documents and correct identifiers.", "cue": "The request category is payment-routing change, even if the appearance is convincing.", "doThis": "Open the ticket and mark it as enhanced-verification required.", "insteadOf": "Treating formal consistency as enough for routine progression."}, "procurement": {"moment": "When an already opened ticket reaches your review queue.", "cue": "The ticket shows that the request was processed internally, not that supplier intent was authenticated.", "doThis": "Check whether the enhanced-verification flag is present; if it is missing, add it before continuing the review.", "insteadOf": "Assuming upstream triage confidence equals supplier authentication."}, "vendorData": {"moment": "When a vendor-update ticket enters the data-management workflow.", "cue": "The request changes bank details, which is a high-risk category outside the scope of ordinary data completion.", "doThis": "Require the category flag and trusted-verification evidence before treating the ticket as ready for screening.", "insteadOf": "Starting from the assumption that upstream workflow completion already closed authentication."}, "finance": {"moment": "When a later payment batch includes a supplier account recently updated through a bank-change ticket.", "cue": "The payment destination depends on a change request whose origin may still be unauthenticated.", "doThis": "Look for documented trusted-channel verification before considering release.", "insteadOf": "Reading a completed procurement ticket as sufficient provenance for payment release."}, "security": {"moment": "When designing intake controls for supplier payment-routing changes.", "cue": "The first moment in the workflow is where a high-risk request can become normalised.", "doThis": "Define a mandatory triage flag and simple escalation language for every bank-change category.", "insteadOf": "Waiting for individual suspicion to trigger security involvement."}}, "diag": {"mechanism": "Legitimacy is produced through organisational form: correct identifiers, familiar names, formal documents, and ticket conventions make the request readable as normal work.", "vulnerability": "The first vulnerability is not a missing email check. It is the habit of treating a well-formed bank-change request as ready for routine processing.", "tacitNorm": "If a request looks like it belongs to the workflow, the professional response is to move it into the workflow quickly.", "behaviouralShift": "For any supplier payment-routing or bank-coordinate change, the category of the request triggers enhanced verification before appearance is allowed to create confidence."}, "mechanism": {"name": "Impression Management + Authority Cues", "theorists": "Goffman (1959) · Cialdini (1984)", "note": "The attacker performs legitimacy rather than breaking security. By mirroring internal conventions — correct identifiers, familiar names, proper formatting — the message exploits how trust is constructed through surface consistency. Authority cues (a known signatory, a real meeting reference) suppress the instinct to question the request."}, "scenario": ["It is early in the week, and the office is already running at pace. A major seasonal event is approaching, meaning logistics coordination is under close watch. Into this environment, an email arrives — apparently from Provider L, a long-standing logistics partner operating across several European markets.", "The message is formally written. The attached PDF is a banking-coordinate change notice citing a recent quarterly business review. The sending domain looks right. The master services agreement identifier is correct. The signatory's name is one you recognise.", "A procurement ticket is opened, the materials attached, and the case assigned to the regional lead for review. The process has been followed correctly. Nothing about this moment feels unusual."], "roleNotes": {"analyst": "This is your moment in the chain. The email lands in your queue, and by every available signal it looks routine. You have seen requests like this before.", "procurement": "You will receive this ticket shortly. The documentation has already passed one informal layer of review and will look entirely plausible.", "vendorData": "A ticket is on its way to you. It will arrive looking complete — with documentation that has been reviewed upstream.", "finance": "The payment record that eventually reaches you starts here, on a Monday morning that feels entirely normal.", "security": "The first link in the chain. No flag was raised. No escalation path was triggered at this stage."}, "decision": {"prompt": "The email looks legitimate — formally written, correct identifiers, a real meeting reference. It is a banking-coordinate change request from a known partner. What should happen at this stage?", "options": [{"label": "A", "text": "Open a standard procurement ticket and assign to the regional lead — the documentation looks right and the process can proceed normally.", "isCorrect": false, "explanation": "This is exactly what happened — and within the existing process, it made complete sense. The gap was that the process had no rule designating bank-change requests as a category that always requires independent authentication, regardless of how legitimate the documentation appears."}, {"label": "B", "text": "Open the ticket, but immediately flag it for enhanced verification — because any supplier bank-coordinate change requires independent authentication by category, not by appearance.", "isCorrect": true, "explanation": "Correct. The formal style and correct identifiers confirm surface consistency, not authenticity. The category of the request — not its appearance — should trigger enhanced verification. This rule did not exist in the original workflow."}, {"label": "C", "text": "Reply to the email asking Provider L to confirm the request before proceeding.", "isCorrect": false, "explanation": "The instinct is right, but the channel is wrong. Replying to the email means using the same potentially compromised communication channel. Verification must go through a pre-registered trusted contact maintained independently of the request itself."}], "correctNote": "The essential shift: evaluate bank-change requests by category, not by how convincing they look. A well-constructed request is not evidence of its own legitimacy."}, "whatChanges": "Any supplier banking-coordinate change request is flagged for enhanced verification at the point of triage — regardless of how legitimate the documentation appears. Formal style and correct identifiers are surface signals. They do not authenticate the request."}, {"id": 1, "act": "Act II", "title": "Peer Confirmation Is Not Detail Verification", "subtitle": "Colleagues are consulted. Confidence builds.", "learningObjective": "Peer consultation answers \"is this plausible?\" — only out-of-band verification answers \"is this authentic?\"", "triggerFormula": {"when": "Experienced colleagues confirm they have seen similar requests or recognise the industry pattern", "notice": "They have confirmed the type of request is recognisable — not that this specific IBAN, account, or supplier authorisation is genuine", "action": "Keep the two questions explicitly separate; advance only when the authentication question is answered through an independent channel"}, "roleShift": {"analyst": {"moment": "When a colleague asks whether similar supplier-change requests have appeared in your queue.", "cue": "You can recognise a pattern without knowing whether this specific request is authentic.", "doThis": "Answer only what you know and state that pattern recognition is not supplier authentication.", "insteadOf": "Offering broad reassurance that can later be treated as endorsement."}, "procurement": {"moment": "When you consult peers about a supplier banking-change request.", "cue": "Peers may confirm a trend or industry pattern, but not the specific IBAN, account, or authorisation.", "doThis": "Document peer input as plausibility only and keep trusted-channel authentication open.", "insteadOf": "Treating peer recognition as permission to advance the workflow."}, "vendorData": {"moment": "When a ticket note says peers have confirmed similar notices.", "cue": "The note may blur the difference between plausible pattern and authenticated details.", "doThis": "Ask whether the specific destination and supplier authorisation have been verified independently.", "insteadOf": "Letting peer reassurance lower the threshold for data approval."}, "finance": {"moment": "When a payment file includes peer confirmation in the ticket history.", "cue": "The confirmation may refer to the type of request, not the payment destination.", "doThis": "Require an explicit trusted-channel authentication log before release.", "insteadOf": "Using peer involvement as comfort that the change is safe."}, "security": {"moment": "When writing procedures for supplier-change consultation.", "cue": "Peer confirmation is a useful operational input and a common social-proof trap.", "doThis": "Create separate fields for plausibility confirmation and supplier authentication.", "insteadOf": "Allowing 'peer confirmed' to function as a close status."}}, "diag": {"mechanism": "Social proof converts pattern recognition into confidence: colleagues can make a request feel reasonable even when no one has authenticated its specific details.", "vulnerability": "Peer consultation answers whether the situation is plausible; it does not prove that the supplier authorised this IBAN, account, or request.", "tacitNorm": "If experienced peers recognise the pattern, continuing the workflow feels collectively endorsed and individually safe.", "behaviouralShift": "Separate two questions in every similar case: Is this type of request plausible? Did this supplier authorise this exact change? Only the second question closes authentication."}, "mechanism": {"name": "Social Proof + Diffusion of Responsibility", "theorists": "Cialdini (1984) · Darley & Latané (1968)", "note": "Social proof leads people to use others' behaviour as information about correct action — especially under uncertainty. When peers confirm they've seen similar requests, this functions as a legitimacy signal even when they've confirmed only a general pattern, not this specific transaction. Each additional person who endorses the situation diffuses the sense of individual accountability."}, "scenario": ["The regional procurement lead reviews the ticket. The documentation is, by any reasonable standard, plausible — the agreement identifier is correct, the compliance language fits, the meeting reference is real. The request fits a recognisable pattern: large logistics providers do restructure treasury functions periodically and request banking updates when they do.", "Before proceeding, the lead checks with two regional peers. Have similar notices come through recently? One colleague confirms they processed something comparable not long ago. The other recognises the pattern — treasury centralisation among logistics firms is, they note, fairly common.", "Both responses are genuine, offered in good faith. But each has answered a particular question: is this type of request recognisable as a pattern? Neither has answered the question that mattered: did Provider L actually send this one, with these specific banking details?"], "roleNotes": {"analyst": "Your ticket has been picked up. Peer consultation is underway — the lead is doing due diligence by the book.", "procurement": "This is your moment. You have checked with experienced colleagues and both confirmed the pattern. The documentation looks right. Everything points forward.", "vendorData": "The ticket is about to arrive at your desk, carrying the weight of prior consultation and apparent validation.", "finance": "Each layer of informal confirmation adds to what will eventually reach you as a clean, completed payment record.", "security": "Peer confirmation has just reinforced forward momentum across the workflow. No flag has been raised."}, "decision": {"prompt": "Two experienced colleagues confirm they have seen similar banking-change requests from logistics providers recently. What has this peer consultation established?", "options": [{"label": "A", "text": "That this request is legitimate — experienced colleagues would not confirm something that was suspicious.", "isCorrect": false, "explanation": "Neither colleague confirmed this request was legitimate. Both confirmed that this type of request is recognisable industry behaviour. That is a meaningfully different question — and one the attacker anticipated, because it is predictable."}, {"label": "B", "text": "That banking-change requests from logistics providers are a recognisable pattern — but not that this specific request from Provider L is authentic.", "isCorrect": true, "explanation": "Exactly right. Peer confirmation answers the plausibility question, not the authentication question. The two questions feel related but require entirely different verification steps. Conflating them is precisely what the attacker depended on."}, {"label": "C", "text": "That no further verification is necessary since multiple experienced people have reviewed the situation.", "isCorrect": false, "explanation": "This is where diffusion of responsibility becomes dangerous. Multiple people involved does not mean the critical question has been answered. It means confidence has accumulated — around the wrong question."}], "correctNote": "Two questions live in every bank-change workflow: (1) Is this type of request plausible? (2) Did this supplier actually send it? Peer consultation can answer question one. Only out ned risk signals.", "insteadOf": "Approving because the dashboard does not look alarming."}, "finance": {"moment": "When the payment file contains an AI-screening result.", "cue": "A low-risk result is due diligence evidence, not authentication evidence.", "doThis": "Look for the trusted-verification log as a separate release condition.", "insteadOf": "Interpreting the AI score as authorisation to pay."}, "security": {"moment": "When configuring AI-assisted vendor screening and its interface.", "cue": "Users may over-read a low-risk result as proof that the request is genuine.", "doThis": "Add scope labels and mandatory escalation conditions for payment-routing changes.", "insteadOf": "Letting the AI output carry implicit authority beyond its actual function."}}, "diag": {"mechanism": "Automation reassurance turns a bounded technical result into a broader organisational permission to proceed.", "vulnerability": "The AI screening output can validate account plausibility and regulatory exposure, but it cannot verify supplier intent, requester identity, or origin of the change request.", "tacitNorm": "If the tool returns a low-to-moderate risk result, the remaining uncertainty is small enough to continue.", "behaviouralShift": "Every screening result is read with its boundary attached: what the tool confirmed, what it did not confirm, and which unresolved question still requires human or supplier-side verification."}, "mechanism": {"name": "Automation Bias + Trust in Expert Systems", "theorists": "Giddens (1990) · Mosier & Skitka (1996)", "note": "Automation bias is the tendency to over-rely on automated decision aids — accepting their output without critically evaluating the scope of what they assess. Giddens' concept of trust in expert systems explains why the AI tool's result carries disproportionate weight: it is experienced as institutional endorsement, a black-box confirmation that exceeds what the tool was actually designed to do."}, "scenario": ["The vendor data management team submits the new banking coordinates to the organisation's AI-assisted vendor risk screening platform. The result comes back: low-to-moderate risk. The account belongs to a registered EU financial institution. There is a partial match on the account-holder name. No sanctions flags. No adverse media.", "The team approves the update. A follow-up email — again, apparently from Provider L — requests that the new details be applied to the next quarterly payment batch.", "The AI tool performed exactly as designed. The problem was not the tool. It was that the output was read as broader clearance than the tool's scope could support. A plausible account with no sanctions exposure is not a verified supplier identity."], "roleNotes": {"analyst": "The ticket you opened has now been through peer consultation and AI screening. Both returned broadly positive signals.", "procurement": "The documentation you forwarded has cleared AI screening with a low-to-moderate risk result. The workflow is close to complete.", "vendorData": "This is your moment. You ran the screening, received the result, and made the approval decision. The scope of what you confirmed matters.", "finance": "The payment record that will reach you will show AI screening completed and passed. It will not show what the tool could and could not verify.", "security": "The AI tool has just provided a legitimacy signal to the request — one it was never designed to provide. The scope gap is invisible in the workflow record."}, "decision": {"prompt": "The AI screening result says \"low-to-moderate risk.\" Which of the following accurately describes what this result confirmed?", "options": [{"label": "A", "text": "The account exists, is registered to a real EU financial institution, and has no sanctions exposure or adverse media — with a partial name match noted.", "isCorrect": true, "explanation": "Correct. This is precisely what the tool was designed to check: regulatory standing, sanctions status, adverse media, account-holder plausibility. It returned an accurate result within its defined scope. That scope simply did not include supplier identity verification or request authorisation."}, {"label": "B", "text": "Provider L's identity has been verified and the request has been authenticated as coming from them.", "isCorrect": false, "explanation": "The tool confirmed the account's plausibility — not who submitted the request. Identity verification and account plausibility are entirely different things, and no component of this workflow performed the former."}, {"label": "C", "text": "The payment is safe to proceed — a low-to-moderate risk score indicates the transaction does not represent significant fraud exposure.", "isCorrect": false, "explanation": "A risk score assesses the account's regulatory profile, not the authenticity of the request. \"Low-to-moderate risk\" on an account says nothing about whether the person who submitted the request had any right to do so."}], "correctNote": "Every AI screening result must be annotated with two explicit boundaries: what it confirmed, and what it did not confirm. The tool's scope is the ceiling of what it can authorise — nothing above it."}, "whatChanges": "AI screening results are annotated before any approval decision — explicitly recording what the tool confirmed (account standing, sanctions status, adverse media) and what it did not confirm (requester identity, supplier authorisation). A partial name match or limited transaction history on a payment-routing change is escalated rather than noted and passed over."}, {"id": 3, "act": "Act III", "title": "The Accumulation of Weak Signals", "subtitle": "Each signal has an explanation. Together, they are something else.", "learningObjective": "Weak signals must be counted cumulatively — two or more in the same workflow require a mandatory pause", "triggerFormula": {"when": "Two or more defined weak signals appear in the same bank-coordinate change workflow", "notice": "Each signal has a plausible individual explanation — together, they change the collective risk profile of the transaction", "action": "Pause the workflow and require out-of-band verification — regardless of how reasonable each signal seems when viewed alone"}, "roleShift": {"analyst": {"moment": "When you notice a small inconsistency at intake.", "cue": "A detail can be individually explainable and still become important when combined later.", "doThis": "Tag the weak signal in a shared field that later roles can see.", "insteadOf": "Dismissing it because it does not look suspicious enough on its own."}, "procurement": {"moment": "When documentation looks plausible but one detail does not fully align.", "cue": "Minor mismatch plus urgency, a critical supplier, or a bank change may form a pattern.", "doThis": "Add the weak signal and pause if the defined threshold is reached.", "insteadOf": "Keeping discomfort private while allowing the workflow to continue."}, "vendorData": {"moment": "When screening shows a partial match, limited history, or unusual account profile.", "cue": "The output reveals an explainable but meaningful signal.", "doThis": "Count it together with earlier signals and escalate if two or more signals are present.", "insteadOf": "Treating each signal as isolated and therefore harmless."}, "finance": {"moment": "When a recent-update note appears before payment release.", "cue": "This may be the last visible signal in a chain that other roles have already touched.", "doThis": "Check the weak-signal count and require trusted verification if the threshold is reached.", "insteadOf": "Normalising the note as routine payment-batch information."}, "security": {"moment": "When designing detection for social-engineering workflows.", "cue": "Signals are distributed across roles, systems, and time.", "doThis": "Create a shared aggregation rule that turns combined weak signals into a legitimate pause.", "insteadOf": "Expecting one role to see the whole pattern unaided."}}, "diag": {"mechanism": "Weak signals become harmless when they are interpreted one by one. The risk emerges from accumulation across roles and workflow stages.", "vulnerability": "The organisation lacked a signal-counting rule: partial match, limited history, pattern-only peer confirmation, and recent-change flags were individually explainable but collectively meaningful.", "tacitNorm": "If each irregularity has a plausible explanation, there is no legitimate reason to interrupt a completed workflow.", "behaviouralShift": "When two or more defined weak signals appear in the same supplier-change workflow, the role that sees the next signal is authorised to pause the process and require trusted-channel verification."}, "mechanism": {"name": "Normalisation of Deviance + Organisational Ambiguity", "theorists": "Vaughan (1996) · Weick (1988)", "note": "Normalisation of deviance describes how organisations gradually accept small deviations from standard practice as normal — each one individually justified, cumulatively dangerous. Organisational ambiguity means that when responsibility is distributed across different roles and signals appear in different parts of the workflow, no single actor has the full picture required to recognise a combined risk profile."}, "scenario": ["By the time the payment batch is being prepared, the workflow has been running for several days and every formal step has been completed. But embedded in that chain are four details that, in isolation, each have a plausible explanation.", "The new bank account has limited transaction history — consistent with a newly established treasury entity. The account-holder name match is only partial — consistent with a treasury subsidiary operating under a slightly different registered name. The peer confirmations confirmed a general industry pattern, not this specific IBAN. And a recent bank-coordinate change flag is present on a current-cycle payment.", "No single person encountered all four signals simultaneously. Each was seen by a different person, at a different stage, explained individually, and passed over. The organisation had no rule for counting them."], "roleNotes": {"analyst": "You encountered the first signal when the ticket was opened — but without a counting rule, it was not yet visible as a signal.", "procurement": "Two signals were present when you conducted peer consultation. Each had a ready, reasonable explanation.", "vendorData": "The third signal — partial name match, limited transaction history — appeared in your screening result. Both were noted. Neither triggered escalation.", "finance": "The fourth signal is yours: the recent bank-update flag on a current-cycle payment. It was the last signal, and it reached you last.", "security": "Four signals distributed across five roles, in five separate workflow steps. No aggregation rule existed to connect them."}, "decision": {"prompt": "Four weak signals are visible in the same supplier bank-coordinate change workflow: limited transaction history, partial name match, peer pattern-only confirmation, and a recent bank-update flag. Each has a plausible individual explanation. What should happen?", "options": [{"label": "A", "text": "Continue — each signal is individually explainable, so the workflow can proceed as normal.", "isCorrect": false, "explanation": "This is what happened. And each individual explanation was reasonable. The problem was the absence of an aggregation rule. Weak signals are dangerous not because they are alarming individually, but because they are individually explainable."}, {"label": "B", "text": "When two or more weak signals appear in the same workflow, the process pauses and out-of-band verification is mandatory before it can continue.", "isCorrect": true, "explanation": "The right rule. This is not a checklist for detecting fraud — it is a rule for converting individually explainable signals into a collective pause. The signals do not need to be alarming. They need to be counted."}, {"label": "C", "text": "Escalate immediately to the security team — four signals present means this is almost certainly fraud.", "isCorrect": false, "explanation": "The response to accumulated signals should be a verification pause, not an immediate fraud accusation. Framing escalation as accusation creates the kind of friction that makes people reluctant to raise concerns in the first place."}], "correctNote": "Signal accumulation is the missing organisational rule. Two or more defined weak signals in the same workflow triggers a mandatory pause — not because each signal is alarming, but because together they change the risk profile of the transaction."}, "whatChanges": "The organisation introduces a signal-counting rule: two or more defined weak signals in the same bank-change workflow triggers a mandatory pause and out-of-band verification requirement. Signals are logged by whoever encounters them and are visible to all actors in the workflow, not siloed within each step."}, {"id": 4, "act": "Act III — cont.", "title": "The Payment-Batch Flag", "subtitle": "The system confirms the update was registered. Or does it?", "learningObjective": "A \"recently updated\" note on a current-cycle payment is a risk signal — not a data-quality confirmation", "triggerFormula": {"when": "Preparing to release a payment where banking details changed in the current billing cycle", "notice": "\"Bank details recently updated\" — a data-quality marker that simultaneously functions as a risk signal when it coincides with a current-cycle payment", "action": "Require documented out-of-band verification before release — a completed workflow record is not equivalent to supplier confirmation"}, "roleShift": {"analyst": {"moment": "When the initial request affects an upcoming payment cycle.", "cue": "Near-term payment application increases pressure and operational risk.", "doThis": "Tag the ticket as payment-release-sensitive from the start.", "insteadOf": "Treating it as an ordinary master-data update."}, "procurement": {"moment": "When approving a banking change shortly before a scheduled payment.", "cue": "Continuity pressure can make completion feel safer than interruption.", "doThis": "Make trusted-channel verification a visible prerequisite for finance release.", "insteadOf": "Assuming completed procurement review is enough for payment execution."}, "vendorData": {"moment": "When a bank update is approved close to the payment cycle.", "cue": "A low-risk score and time pressure can combine into false comfort.", "doThis": "Mark the update as a recent-change release risk and require the release control.", "insteadOf": "Letting data approval feed automatically into payment release."}, "finance": {"moment": "When releasing a batch with a recently changed payment destination.", "cue": "The workflow may be complete while supplier authentication evidence is absent.", "doThis": "Pause release until trusted-channel verification is documented.", "insteadOf": "Releasing because logistics continuity makes stopping feel disruptive."}, "security": {"moment": "When defining payment-release controls.", "cue": "Recent banking changes are late-stage risk signals, not routine metadata.", "doThis": "Make the payment platform require verification evidence for current-cycle bank changes.", "insteadOf": "Leaving the alert as an optional prompt that users can normalise."}}, "diag": {"mechanism": "Operational urgency makes the easiest interpretation feel like the responsible one: a completed workflow and a system flag appear to support release.", "vulnerability": "A recent bank-update note can be misread as a data-quality marker, when in a current-cycle payment it should function as a verification trigger.", "tacitNorm": "When the workflow is complete and continuity matters, stopping at payment release looks like unnecessary friction.", "behaviouralShift": "Before releasing any payment affected by a recent banking change, finance checks for documented trusted-channel verification. Workflow completion alone is not enough."}, "mechanism": {"name": "Urgency Framing + Cognitive Ease", "theorists": "Cialdini (1984) · Kahneman (2011)", "note": "Urgency framing — heightened here by a seasonal calendar deadline — pushes decision-making toward the path of least resistance. Kahneman's System 1 thinking favours the intuitive, low-friction interpretation: a completed workflow and a data-quality marker both signal that the situation is under control. Questioning them requires deliberate cognitive effort that urgency makes feel disproportionately costly."}, "scenario": ["The seasonal event is two weeks out. Logistics continuity at this point in the calendar is operationally critical — any disruption to last-mile delivery would be felt immediately and visibly. The payment batch is queued for release.", "As the finance operations manager prepares to release it, an informational note is visible alongside Provider L's entry: bank details recently updated. The workflow record shows all steps completed. Documentation has been through procurement review and AI screening.", "The note reads as confirmation that everything is in order — the system has registered the change, the process is done. The payment is released."], "roleNotes": {"analyst": "The ticket you opened has completed the full journey through the workflow. It now represents a completed, clean payment record.", "procurement": "The documentation you validated is now part of a completed workflow record in the payment system.", "vendorData": "Your AI screening approval is embedded in the payment record that is about to be released.", "finance": "This is your moment. The flag is visible. The seasonal calendar is pressing. The workflow record looks complete.", "security": "The last point at which the payment could have been stopped. The flag existed in the system. No rule existed to read it as a risk signal."}, "decision": {"prompt": "You are preparing to release the quarterly payment batch. Alongside Provider L's entry you notice: \"bank details recently updated.\" The seasonal event is two weeks away. The full workflow record shows all steps completed. What does this flag mean?", "options": [{"label": "A", "text": "It is a data-quality marker confirming the system has registered the banking change — the update went through correctly.", "isCorrect": false, "explanation": "This is how it was read — and the system did design it as a data-quality marker. But in a current-cycle payment where banking details changed recently, the flag is simultaneously a risk signal. The organisation had no rule that made this distinction."}, {"label": "B", "text": "It is a risk signal. A recent bank-coordinate change on a current-cycle payment requires documented evidence of out-of-band verification before the payment can be released.", "isCorrect": true, "explanation": "Correct. A completed workflow record is evidence that the workflow was completed, not that out-of-band verification occurred. These are different things. A recent banking change in the current payment cycle is precisely the signal that should have triggered that distinction."}, {"label": "C", "text": "The update was verified at the vendor data stage, so this flag confirms that prior verification is already on record.", "isCorrect": false, "explanation": "The vendor data stage ran AI screening, which confirmed account plausibility. That is not out-of-band verification with Provider L. A completed workflow record is not verification evidence."}], "correctNote": "The rule that was missing: if banking details for a payee changed within the current billing cycle, payment release requires documented evidence of out-of-band verification — not a completed workflow record, but confirmation that Provider L was contacted independently."}, "whatChanges": "A recent bank-coordinate change on a current-cycle payment is treated as a risk signal requiring a verification pause before release. The release checklist includes: \"Were banking details changed in this cycle? If yes, is out-of-band verification documented?\" A completed workflow record does not satisfy this requirement."}, {"id": 5, "act": "Acts IV — V", "title": "Trusted-Channel Verification", "subtitle": "The control that was missing. How it works.", "learningObjective": "Out-of-band verification uses a pre-registered contact that predates the request — never a channel supplied by the request itself", "triggerFormula": {"when": "A flagged bank-coordinate or routing change requires verification with the supplier", "notice": "Every contact channel supplied by the request — the email sender, PDF contacts, reply address — is inside the attacker's potential control", "action": "Contact using the pre-registered masterfile contact maintained by the Security team, established independently before this request arrived"}, "roleShift": {"analyst": {"moment": "When a flagged request requires supplier confirmation.", "cue": "Any contact supplied by the request may be controlled by the requester.", "doThis": "Use only the pre-registered supplier contact from the trusted masterfile.", "insteadOf": "Replying to the request email or using contact details in the attached PDF."}, "procurement": {"moment": "When supplier authorisation must be confirmed before the workflow continues.", "cue": "Documents can show consistency but cannot answer supplier intent.", "doThis": "Contact the supplier through the trusted channel and log the result.", "insteadOf": "Asking the sender of the request to confirm itself."}, "vendorData": {"moment": "Before finalising a vendor bank-data update.", "cue": "Trusted-channel evidence should exist before the new destination becomes operational.", "doThis": "Require the verification log before final approval.", "insteadOf": "Approving based only on screening and completed documentation."}, "finance": {"moment": "Before payment release after a recent bank-coordinate change.", "cue": "Urgency and workflow completion do not replace supplier authentication.", "doThis": "Require documented trusted-channel verification as a release condition.", "insteadOf": "Accepting workflow completion as proof that the supplier authorised the destination."}, "security": {"moment": "Before any incident occurs.", "cue": "Without a trusted contact list, out-of-band verification becomes improvised and fragile.", "doThis": "Own the supplier contact list, verification script, and evidence log protocol.", "insteadOf": "Treating verification as an ad hoc task left to individual judgment."}}, "diag": {"mechanism": "Trust must be re-anchored outside the potentially compromised workflow through an access point controlled by the organisation.", "vulnerability": "All prior checks looked inward at documents, tickets, peer opinions, and tool outputs. None used a trusted supplier contact independent of the incoming request.", "tacitNorm": "Verification means confirming that the internal process has been completed correctly.", "behaviouralShift": "Out-of-band verification uses a pre-registered supplier contact that predates the request. Security owns the contact list, the verification protocol, and the language that makes pausing normal."}, "mechanism": {"name": "Access Points + Facework in Expert Systems", "theorists": "Giddens (1990) · Collins & Porras (1994)", "note": "Giddens describes \"access points\" as the face-to-face interactions that maintain trust in abstract expert systems. When the abstract system (the procurement workflow) is potentially compromised, trust must be re-anchored at an access point — direct contact with a known, pre-registered representative of the counterparty. Without a maintained list of trusted contacts, this access point structurally does not exist."}, "scenario": ["The investigation that follows on Friday reveals the decisive missing control clearly: at no point did anyone contact Provider L through a channel that had not been supplied by the request itself. Every verification step looked inward. None looked outward, to Provider L directly.", "Out-of-band verification means contacting the counterparty through a channel maintained independently of the transaction being verified. It means using a phone number or contact person that appears in the organisation's pre-existing supplier masterfile — not a number provided in the request email, not a number listed in the accompanying PDF, not a reply to the original message.", "For this to work in practice, the organisation must maintain a pre-registered contact list for critical suppliers. The security and anti-fraud team owns this list and the verification protocol. Every role has a fast, non-blaming path to pause and verify without it feeling like an accusation or an obstacle to operational speed."], "roleNotes": {"analyst": "When you flag a request for enhanced verification, the pre-registered contact list is what you use. Not anything supplied by the request.", "procurement": "When you need to answer \"did Provider L actually send this?\", the answer comes from the trusted-channel contact — not from the documentation in the ticket.", "vendorData": "Your AI screening result is complete once you annotate its scope. Trusted-channel verification happens upstream of your step, as a prerequisite to the ticket reaching you.", "finance": "Before releasing a payment with a recent banking change, you need to see documented trusted-channel verification — a log entry confirming contact was made through a pre-registered channel. A workflow completion record is not this.", "security": "You own the pre-registered contact list, the verification card, and the escalation language. Your job is to make pausing feel like professional judgment, not like slowing the business down."}, "decision": {"prompt": "A bank-change request has been flagged for verification. You need to confirm with Provider L that they actually sent it. Which of the following is correct out-of-band verification?", "options": [{"label": "A", "text": "Reply to the original email asking Provider L to confirm the request is genuine.", "isCorrect": false, "explanation": "Replying to the email uses the same channel the attacker controls. If the email was fraudulent, a confirmation request sent through it can be intercepted, ignored, or spoofed. The channel must be independent of the request."}, {"label": "B", "text": "Call the phone number listed in the PDF notice, which includes a Provider L contact for payment queries.", "isCorrect": false, "explanation": "The PDF was part of the fraudulent communication. Any contact details it contains may have been placed there deliberately. Verification must use a channel that existed before this request arrived — not one supplied by it."}, {"label": "C", "text": "Contact Provider L using the pre-registered phone number or named contact from the organisation's supplier masterfile — maintained by the security team independently of any incoming request.", "isCorrect": true, "explanation": "This is out-of-band verification. The channel is independent of the request, maintained before the request arrived, and controlled by the organisation. This is the control that was absent from the original workflow."}], "correctNote": "Out-of-band verification has one rule: use a contact channel that predates the request and was not supplied by it. Everything else — regardless of how many steps it has — is in-band."}, "whatChanges": "The organisation maintains a pre-registered trusted-contact list for all critical logistics and payment partners. When a bank-change request requires verification, every role has access to the relevant contact through a fast, documented path. The security team owns the list, the verification protocol, and the language that makes pausing feel normal."}], "RULEBOOK": [{"n": "01", "title": "Category Beats Appearance", "body": "A supplier bank-coordinate change is a high-risk request category even when the email, PDF, identifiers, signatory names, and ticket conventions look correct. Appearance can make a request plausible; it cannot authenticate supplier intent or request origin.", "apply": "At triage, flag every supplier payment-routing or bank-coordinate change for enhanced verification before the workflow continues as routine.", "color": "#60A5FA", "bg": "rgba(96,165,250,0.08)", "bd": "rgba(96,165,250,0.22)"}, {"n": "02", "title": "Pattern Confirmation Is Not Detail Verification", "body": "Peer consultation can confirm that a request sounds like a recognisable industry pattern. It cannot confirm that this specific supplier sent this specific request with these specific banking details.", "apply": "Keep two questions separate: peers may answer 'is this plausible?', but only a trusted supplier channel can answer 'is this authentic?'.", "color": "#F5A623", "bg": "rgba(245,166,35,0.1)", "bd": "rgba(245,166,35,0.28)"}, {"n": "03", "title": "AI Screening Has a Scope", "body": "AI-assisted vendor screening can assess account plausibility, sanctions exposure, adverse media, and risk indicators. It does not authenticate who submitted the request or whether the supplier authorised the change.", "apply": "Before approval, annotate every screening result with two lines: what the tool confirmed, and what it did not confirm. Escalate partial matches or limited account history on payment-routing changes.", "color": "#A78BFA", "bg": "rgba(167,139,250,0.08)", "bd": "rgba(167,139,250,0.22)"}, {"n": "04", "title": "Weak Signals Must Be Counted Together", "body": "A weak signal is often not dramatic. It is usually a small detail with a plausible explanation. The organisational risk appears when several explainable signals accumulate in the same workflow.", "apply": "If two or more defined weak signals appear in one bank-change workflow, pause the process and require trusted-channel verification. Do not wait for one signal to look suspicious enough on its own.", "color": "#F87171", "bg": "rgba(248,113,113,0.08)", "bd": "rgba(248,113,113,0.28)"}, {"n": "05", "title": "Payment Release Requires Supplier Authentication", "body": "A completed internal workflow proves that internal steps were completed. It does not prove that the supplier authorised a new payment destination, especially when banking details changed in the current billing cycle.", "apply": "Before releasing a payment affected by a recent bank-coordinate change, require documented out-of-band verification through a pre-registered supplier contact maintained independently of the incoming request.", "color": "#34D399", "bg": "rgba(52,211,153,0.08)", "bd": "rgba(52,211,153,0.28)"}], "QUIZ_DATA": [{"id": 0, "q": "What was the primary gap the incident exposed?", "opts": [{"t": "Employees lacked sufficient phishing awareness training."}, {"t": "The process validated internal consistency but never confirmed external authenticity.", "correct": true}, {"t": "The AI screening tool failed to flag the fraudulent account."}, {"t": "The email domain was not checked at the point of triage."}], "exp": "The process existed, was followed correctly, and still failed — because it only ever verified that things looked right internally. No step confirmed with Provider L that the request was genuine."}, {"id": 1, "q": "What did the AI screening result actually confirm in this workflow?", "opts": [{"t": "Provider L's identity and the legitimacy of the request."}, {"t": "That the account was registered and had no sanctions exposure or adverse media.", "correct": true}, {"t": "That the payment could proceed without further verification."}, {"t": "That the banking coordinates matched Provider L's records."}], "exp": "The AI tool performed as designed. It assessed regulatory standing, sanctions status, and account plausibility. It said nothing about who submitted the request or whether Provider L had authorised it."}, {"id": 2, "q": "A colleague confirms they processed a similar banking-change request from another logistics provider last month. This peer confirmation establishes:", "opts": [{"t": "That this specific request from Provider L is authentic."}, {"t": "That this type of request follows a recognisable industry pattern.", "correct": true}, {"t": "That the IBAN and account details have been independently verified."}, {"t": "That no further verification is required."}], "exp": "Peer confirmation answers the plausibility question — is this type of request recognisable? It cannot answer the authentication question — did Provider L send this one? The attacker designed the request to pass the first test, knowing it would be mistaken for the second."}, {"id": 3, "q": "You identify two weak signals in the same bank-change workflow: a partial account-holder name match and a recent banking update on a current-cycle payment. Each has a plausible explanation. What should happen?", "opts": [{"t": "Continue — each signal is individually explainable."}, {"t": "Note them in the audit log and proceed with heightened attention."}, {"t": "Pause the workflow and initiate out-of-band verification.", "correct": true}, {"t": "Notify the supplier and ask them to resubmit the request."}], "exp": "Two or more defined weak signals in the same workflow trigger a mandatory pause. Signals do not need to be alarming individually — they need to be counted. The rule converts individually explainable data points into a collective stop."}, {"id": 4, "q": "Out-of-band verification means:", "opts": [{"t": "A second team member independently reviews the same documentation."}, {"t": "Running the banking coordinates through two separate risk screening tools."}, {"t": "Contacting Provider L via a pre-registered channel from the supplier masterfile, independent of the request.", "correct": true}, {"t": "Replying to the original email and requesting a signed confirmation."}], "exp": "Out-of-band means the verification channel is independent of the channel used to submit the request. Only a contact that predates the request and was not supplied by it qualifies. Everything else — including a reply to the original email — remains in-band."}], "DEBRIEF": {"analyst": {"before": "Received a formally styled email with correct identifiers and opened a standard procurement ticket.", "after": "Opens the ticket and immediately flags it for enhanced verification — because any supplier bank-coordinate change is a category that requires independent authentication, regardless of how legitimate the documentation appears.", "key": "Category, not appearance, determines verification requirements."}, "procurement": {"before": "Reviewed documentation, found it plausible, and sought peer confirmation that similar requests had been seen recently.", "after": "Explicitly separates two questions: \"Is this type of request recognisable?\" (peers can answer this) and \"Did Provider L actually send this specific request?\" (only out-of-band verification can answer this). Does not advance the ticket until the second question is independently answered.", "key": "Peer confirmation closes the plausibility question. It cannot close the authentication question."}, "vendorData": {"before": "Submitted coordinates to AI screening, received a low-to-moderate result, and approved the update.", "after": "Annotates the AI screening result before any approval decision — recording what the tool confirmed and what it did not confirm. A partial name match and limited transaction history together, on a payment-routing change, are escalated rather than noted and passed over.", "key": "AI screening supports due diligence. It does not substitute for supplier identity verification."}, "finance": {"before": "Saw the recent bank-update flag, read it as a data-quality confirmation, and released the payment.", "after": "Treats a recent bank-coordinate change on a current-cycle payment as a risk signal requiring documented out-of-band verification before release. A completed workflow record is not that documentation.", "key": "If banking details changed in this billing cycle, payment release requires verification evidence — not a completed workflow record."}, "security": {"before": "Received the escalation after payment execution and conducted a retrospective investigation.", "after": "Owns the verification architecture before incidents occur — maintains the pre-registered contact list, provides the trusted-channel verification card, and designs the escalation language that makes pausing feel like professional judgment rather than obstruction.", "key": "Make interruption normal. Fast, non-blaming escalation paths are the infrastructure that protects the organisation."}, "general": {"before": "Looked at the incident as something belonging only to procurement, vendor data, finance, or security specialists.", "after": "Recognises the shared organisational pattern: whenever a workflow becomes convincing through internal consistency, the team still needs to ask what has actually been authenticated and what has only been processed.", "key": "The rule applies beyond the five role-specific paths: separate plausibility, process completion, and supplier authentication in any high-impact workflow."}}};

function esc(v){
  return String(v ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function role(){ return DATA.ROLES.find(r => r.id === state.roleId) || DATA.ROLES[0]; }
function scrollTop(){ try { window.scrollTo({top:0,behavior:'smooth'}); } catch(e) { window.scrollTo(0,0); } }
function go(nextScreen){ state.screen = nextScreen; state.openMechanism = false; render(); scrollTop(); }
function startRole(id){ state.roleId = id; state.screen = id === 'general' ? 'frame' : 0; render(); scrollTop(); }
function restart(){ state.roleId = null; state.screen = 0; render(); scrollTop(); }
function pill(txt){ return `<span class="pill">${esc(txt)}</span>`; }

function renderWelcome(){
  root.innerHTML = `
    <div class="app">
      <div class="welcome">
        <div class="card welcome-card">
          <div class="kicker">Internal learning lab · Group 2</div>
          <h1>Process Complete Is Not Authentication</h1>
          <p class="lead">This internal training helps teams handle supplier payment-routing changes before confidence turns into momentum. The focus is simple: a workflow can be complete and still not prove that the supplier authorised the change.</p>

          <div class="section hi">
            <div class="label">What this training covers</div>
            <p>The risk is not that one employee missed an obvious warning. The risk emerges when plausible documents, peer reassurance, AI-assisted screening, ticket progression, and payment-batch records make continuation feel normal. The practical distinction is between evidence that a workflow was followed and evidence that the supplier authorised the change.</p>
          </div>

          <div class="cols">
            <div class="section">
              <div class="label">Current risk pattern</div>
              <h3>Workflow completion feels sufficient</h3>
              <p>A request moves through the expected roles, tools, and approvals. Each step appears reasonable, so stopping the chain feels unnecessary or disruptive.</p>
            </div>
            <div class="section">
              <div class="label">Target working practice</div>
              <h3>Authentication becomes a shared duty</h3>
              <p>Each role knows which cue requires a pause, what the workflow has not proven, and how to trigger trusted out-of-band verification without blame.</p>
            </div>
          </div>

          <div class="section">
            <div class="label">60-second supplier-change scenario</div>
            <p>In the scenario, Provider L appears to request new banking coordinates before a major seasonal sales event. The documentation looks formal, peers recognise the pattern, the AI screening result is not alarming, and the payment batch shows a completed update.</p>
            <p>This scenario is used to practise a rule that applies beyond Provider L: when a supplier payment-routing change is supported only by internal consistency, the Organisation still needs independent supplier authentication through a trusted channel.</p>
          </div>

          <div class="section">
            <div class="label">How this training works</div>
            <div class="diag-grid">
              <div class="diag-card"><div class="label">Role-based</div><p>Different roles see different fragments of the same risk. Each path explains what that role can notice, say, pause, or verify.</p></div>
              <div class="diag-card"><div class="label">Decision-centred</div><p>The path follows decision moments. The goal is to practise what to do at the point where a familiar routine would normally continue.</p></div>
              <div class="diag-card"><div class="label">Self-paced</div><p>Users can move through the material at their own speed, revisit the rulebook, and test whether they can apply the same checks to similar supplier-change requests.</p></div>
              <div class="diag-card"><div class="label">Anti-blame</div><p>The point is not to identify who failed. It is to make the routine visible enough that the Organisation can strengthen it.</p></div>
            </div>
          </div>

          <div class="section hi">
            <div class="label">Choose a path to begin</div>
            <p>Select a role-specific path if your work is close to supplier changes, vendor data, payment release, or security support. Choose the general learner path if your work is outside these positions but you still need the core verification rules.</p>
          </div>

          <div class="grid role-grid">
            ${DATA.ROLES.map(r => `
              <button class="role-btn" data-action="start-role" data-role="${esc(r.id)}">
                <span class="abbr" style="background:${esc(r.color)}">${esc(r.abbr)}</span>
                <h3>${esc(r.label)}</h3>
                <p>${esc(r.desc)}</p>
              </button>
            `).join('')}
          </div>
        </div>
      </div>
    </div>`;
}

function renderSidebar(currentRole){
  const isGeneral = currentRole.id === 'general';
  return `
    <aside class="sidebar">
      <div class="side-title">Supplier Verification Lab</div>
      <div class="side-small">${isGeneral ? 'Path' : 'Role'}: ${esc(currentRole.label)}</div>
      <button class="nav-btn ${state.screen === 'frame' ? 'active' : ''}" data-action="go" data-screen="frame">
        <b>Learning Frame</b><br>How to use the lab
      </button>
      ${!isGeneral ? DATA.MODS.map((m, i) => `
        <button class="nav-btn ${state.screen === i ? 'active' : ''} ${state.revealed[m.id] ? 'done' : ''}" data-action="go" data-screen="${i}">
          <b>${esc(m.act)}</b><br>${esc(m.title)}
        </button>`).join('') : ''}
      <button class="nav-btn ${state.screen === 'rulebook' ? 'active' : ''}" data-action="go" data-screen="rulebook">Organisation Rulebook</button>
      <button class="nav-btn ${state.screen === 'debrief' ? 'active' : ''}" data-action="go" data-screen="debrief">${isGeneral ? 'General Debrief & Assessment' : 'Role Debrief & Assessment'}</button>
      <div class="top-actions"><button class="btn" data-action="restart">← Start</button></div>
    </aside>`;
}

function renderFrame(){
  const currentRole = role();
  const isGeneral = currentRole.id === 'general';
  root.innerHTML = `<div class="app"><div class="wrap">${renderSidebar(currentRole)}
    <main class="main">
      ${pill('Learning Frame')}
      <h2>${isGeneral ? 'General Learner Path' : 'How to Use This Lab'}</h2>
      <p><i>Use the Provider L scenario to practise checks that also apply to similar supplier-payment situations.</i></p>
      <div class="section hi">
        <div class="label">Core verification rule</div>
        <h3>Process completion is not supplier authentication.</h3>
        <p>A completed workflow shows that internal steps were followed. It does not show that the supplier authorised the payment-routing change. This training helps each role separate those two forms of evidence before confidence becomes momentum.</p>
      </div>
      <div class="diag-grid">
        <div class="diag-card"><div class="label">Review the scenario</div><p>Review the Provider L scenario to see how plausible documents, peer reassurance, AI screening, and payment records can make a risky request feel normal.</p></div>
        <div class="diag-card"><div class="label">Apply the verification rule</div><p>At each decision point, focus on which cue matters, which assumption needs to be challenged, and which verification step becomes legitimate.</p></div>
        <div class="diag-card"><div class="label">Apply from your path</div><p>${isGeneral ? 'You are viewing the general learner path. Use it to learn the core checks without taking one of the role-specific paths.' : `You are currently viewing the path as <b>${esc(currentRole.label)}</b>. The role lens shows what this position can notice, say, pause, or escalate in similar cases.`}</p></div>
      </div>
      ${isGeneral ? `<div class="section"><div class="label">60-second supplier-change scenario</div><p>Provider L appears to request new banking coordinates before a major seasonal event. Documentation looks formal, peers recognise the pattern, the AI screening result is not alarming, and the payment batch shows a completed update.</p><p>The key lesson is not the sequence of events. When a supplier payment-routing change is supported only by internal consistency, the Organisation still needs independent supplier authentication through a trusted channel.</p></div>` : ''}
      <div class="section">
        <div class="label">Navigation logic</div>
        <p>${isGeneral ? 'This path does not require you to take one of the role-specific routes. Start with the core rule, review the supplier-change scenario, open the Rulebook, and use the Debrief to check whether you can apply the principle to similar workflow risks.' : 'The Acts follow the timeline to create concrete decision moments. The Rulebook collects the verification rules, and the Debrief checks whether the role-specific change is clear.'}</p>
      </div>
      <div class="top-actions">
        ${!isGeneral ? `<button class="btn primary" data-action="go" data-screen="0">Begin Act I →</button>` : ''}
        <button class="${isGeneral ? 'btn primary' : 'btn'}" data-action="go" data-screen="rulebook">Open Rulebook</button>
        <button class="btn" data-action="go" data-screen="debrief">Preview Debrief &amp; Quiz</button>
      </div>
      <div class="footer-space"></div>
    </main></div></div>`;
}

function triggerFormula(formula){
  if(!formula) return '';
  return `<div class="section hi"><div class="label">Use this in similar cases</div><div class="cols"><div><b>When</b><p>${esc(formula.when)}</p></div><div><b>Notice</b><p>${esc(formula.notice)}</p></div></div><div style="margin-top:12px"><b>Action</b><p>${esc(formula.action)}</p></div></div>`;
}
function roleShiftCard(shift, currentRole){
  if(!shift) return '';
  return `<div class="section hi"><div class="label">Updated working rule — ${esc(currentRole.abbr)}</div><p style="margin-bottom:12px">Use this card to make the role's next action clear: what to notice, what it means, what to do, and which old routine to avoid.</p><div class="diag-grid">
    <div class="diag-card"><div class="label">Moment</div><p>${esc(shift.moment)}</p></div>
    <div class="diag-card"><div class="label">Cue</div><p>${esc(shift.cue)}</p></div>
    <div class="diag-card"><div class="label">Do this</div><p>${esc(shift.doThis)}</p></div>
    <div class="diag-card"><div class="label">Instead of</div><p>${esc(shift.insteadOf)}</p></div>
  </div></div>`;
}
function diagnosticCards(diagnostic){
  const cards = [['mechanism','How confidence builds'],['vulnerability','Workflow risk'],['tacitNorm','Hidden work habit'],['behaviouralShift','New working rule']];
  return `<div class="diag-grid">${cards.map(([key,label])=>`<div class="diag-card"><div class="label">${label}</div><p>${esc(diagnostic?.[key])}</p></div>`).join('')}</div>`;
}
function decisionCheckpoint(module){
  const selected = state.decisions[module.id];
  const isRevealed = Boolean(state.revealed[module.id]);
  return `<div class="section"><div class="label">Decision checkpoint</div><h3>${esc(module.decision.prompt)}</h3>
    ${module.decision.options.map((option, index) => {
      let className = 'option';
      if(selected === index) className += ' selected';
      if(isRevealed && option.isCorrect) className += ' correct';
      if(isRevealed && selected === index && !option.isCorrect) className += ' wrong';
      return `<div><button class="${className}" data-action="decision" data-mid="${module.id}" data-index="${index}"><b>${esc(option.label)}.</b> ${esc(option.text)}</button>${isRevealed && selected === index ? `<div class="explain"><p>${esc(option.explanation)}</p></div>` : ''}</div>`;
    }).join('')}
    ${!isRevealed ? `<button class="btn primary" ${selected === undefined ? 'disabled' : ''} data-action="reveal" data-mid="${module.id}">Reveal learning</button>` : `<div class="explain"><div class="label">Correct learning</div><p>${esc(module.decision.correctNote)}</p></div>`}
  </div>`;
}
function renderModule(){
  const currentRole = role();
  const screenNum = Number(state.screen);
  const module = DATA.MODS[screenNum];
  if(!module){ state.screen = 'frame'; return renderFrame(); }
  root.innerHTML = `<div class="app"><div class="wrap">${renderSidebar(currentRole)}
    <main class="main">
      ${pill(module.act)}
      <h2>${esc(module.title)}</h2>
      <p><i>${esc(module.subtitle)}</i></p>
      <div class="section hi"><div class="label">Learning objective</div><p>${esc(module.learningObjective)}</p></div>
      ${triggerFormula(module.triggerFormula)}
      <div class="section story"><div class="label">Supplier-change scenario</div>${module.scenario.map(p=>`<p>${esc(p)}</p>`).join('')}</div>
      <div class="section"><div class="label">Role lens — ${esc(currentRole.abbr)}</div><p>${esc(module.roleNotes[state.roleId] || 'Review this stage from your organisational perspective.')}</p></div>
      ${roleShiftCard(module.roleShift?.[state.roleId], currentRole)}
      <div class="section"><div class="label">Why this moment matters</div><p style="margin-bottom:12px">This card explains what to watch for in daily work: how confidence builds, where the workflow risk appears, which hidden work habit keeps the process moving, and what should be done differently next time.</p>${diagnosticCards(module.diag)}</div>
      <div class="section"><div class="label">Why people may follow the flow</div><h3>${esc(module.mechanism.name)}</h3><p>${esc(module.mechanism.note)}</p></div>
      ${decisionCheckpoint(module)}
      <div class="section rule"><div class="label">Practice change</div><p>${esc(module.whatChanges)}</p></div>
      <div class="top-actions">
        ${screenNum > 0 ? `<button class="btn" data-action="go" data-screen="${screenNum - 1}">← Previous</button>` : `<button class="btn" data-action="go" data-screen="frame">← Learning Frame</button>`}
        ${screenNum < DATA.MODS.length - 1 ? `<button class="btn primary" data-action="go" data-screen="${screenNum + 1}">Next Act →</button>` : `<button class="btn primary" data-action="go" data-screen="rulebook">Rulebook →</button>`}
      </div><div class="footer-space"></div>
    </main></div></div>`;
}

function renderRulebook(){
  const currentRole = role();
  root.innerHTML = `<div class="app"><div class="wrap">${renderSidebar(currentRole)}
    <main class="main">
      ${pill('Verification Rules')}
      <h2>Organisation Rulebook</h2>
      <p><i>Five rules for supplier payment verification — useful whenever a payment-routing change is requested.</i></p>
      <div class="section hi"><div class="label">What this section is for</div><p>Use these rules whenever a supplier payment-routing change starts to look complete inside the workflow. The aim is to recognise the risk, pause at the right moment, and authenticate through a trusted channel before release.</p></div>
      ${DATA.RULEBOOK.map(rule => `<div class="section rule" style="border-left-color:${esc(rule.color)}"><div class="label">Rule ${esc(rule.n)}</div><h3>${esc(rule.title)}</h3><div class="cols"><div><div class="label">Meaning</div><p>${esc(rule.body)}</p></div><div><div class="label">Apply it</div><p>${esc(rule.apply)}</p></div></div></div>`).join('')}
      <div class="section hi"><div class="label">Apply in daily work</div><div class="diag-grid"><div class="diag-card"><div class="label">Before the workflow starts</div><p>Define which request categories automatically require enhanced verification. Do not let the convincing appearance of a document decide the level of control.</p></div><div class="diag-card"><div class="label">While the workflow is moving</div><p>Make weak signals visible across roles. A detail that looks minor to one role may become decisive when combined with signals seen by others.</p></div><div class="diag-card"><div class="label">Before payment release</div><p>Require documented supplier authentication for recent banking changes. A completed ticket is not a substitute for trusted-channel confirmation.</p></div></div></div>
      <div class="section"><div class="label">Conclusion</div><h3>What changes after this learning lab?</h3><p>The goal is not to make employees suspicious of every routine request. The goal is to make one professional distinction explicit: internal consistency is useful evidence, but it is not supplier authentication. When that distinction matters, pausing is not delay, mistrust, or failure. It is the professional behaviour that protects the workflow.</p></div>
      <div class="top-actions"><button class="btn" data-action="go" data-screen="frame">Review Learning Frame</button><button class="btn primary" data-action="go" data-screen="debrief">Role Debrief &amp; Assessment →</button></div>
    </main></div></div>`;
}

function renderDebrief(){
  const currentRole = role();
  const roleId = state.roleId;
  const debrief = DATA.DEBRIEF[roleId] || DATA.DEBRIEF.general;
  const score = DATA.QUIZ_DATA.reduce((total, q) => {
    const answerIndex = state.quiz[q.id];
    return total + (answerIndex !== undefined && q.opts[answerIndex]?.correct ? 1 : 0);
  }, 0);
  const allAnswered = DATA.QUIZ_DATA.every(q => state.quiz[q.id] !== undefined);
  root.innerHTML = `<div class="app"><div class="wrap">${renderSidebar(currentRole)}
    <main class="main">
      ${pill('Debrief — ' + currentRole.label)}
      <h2>${roleId === 'general' ? 'The Verification Rule, Reframed' : 'Your Role, Reframed'}</h2>
      <div class="section hi"><div class="label">Access note</div><p>${roleId === 'general' ? 'This debrief is available for employees who are not in one of the role-specific paths. It checks whether the core verification rule is clear without requiring a full role-based path.' : 'This debrief is available at any time. It is most useful after completing the Acts, but it can also be opened directly to review the expected role shift and assessment.'}</p></div>
      <div class="cols"><div class="section"><div class="label">${roleId === 'general' ? 'Narrow reading' : 'What the workflow made easy'}</div><p>${esc(debrief.before)}</p></div><div class="section"><div class="label">${roleId === 'general' ? 'Shared verification rule' : 'New working practice'}</div><p>${esc(debrief.after)}</p></div></div>
      <div class="section hi"><div class="label">Your key principle</div><p>${esc(debrief.key)}</p></div>
      <h2>Final Assessment</h2><p>5 questions. The goal is application, not memorisation.</p>
      ${DATA.QUIZ_DATA.map((q, qi) => `<div class="section"><h3>${qi + 1}. ${esc(q.q)}</h3>${q.opts.map((opt, oi) => {let cls='option'; if(state.quiz[q.id]===oi) cls+=' selected'; if(state.quizDone && opt.correct) cls+=' correct'; if(state.quizDone && state.quiz[q.id]===oi && !opt.correct) cls+=' wrong'; return `<button class="${cls}" ${state.quizDone?'disabled':''} data-action="quiz" data-qid="${q.id}" data-index="${oi}">${esc(opt.t)}</button>`;}).join('')}${state.quizDone ? `<div class="explain"><p>${esc(q.exp)}</p></div>` : ''}</div>`).join('')}
      ${state.quizDone ? `<div class="section hi"><h2>${score} / ${DATA.QUIZ_DATA.length}</h2><p>${score >= 4 ? 'Strong result. Review any explanation you missed.' : 'Worth revisiting the Acts where you are less confident.'}</p></div>` : `<button class="btn primary" ${!allAnswered ? 'disabled' : ''} data-action="submit-quiz">Submit Assessment</button>`}
      <div class="footer-space"></div>
    </main></div></div>`;
}

function render(){
  if(!state.roleId) return renderWelcome();
  if(state.screen === 'frame') return renderFrame();
  if(state.screen === 'rulebook') return renderRulebook();
  if(state.screen === 'debrief') return renderDebrief();
  return renderModule();
}

root.addEventListener('click', (e) => {
  const el = e.target.closest('[data-action]');
  if(!el || el.disabled) return;
  const action = el.dataset.action;
  if(action === 'start-role') return startRole(el.dataset.role);
  if(action === 'restart') return restart();
  if(action === 'go') {
    const v = el.dataset.screen;
    return go(/^\d+$/.test(v) ? Number(v) : v);
  }
  if(action === 'decision') {
    const mid = el.dataset.mid;
    if(!state.revealed[mid]) state.decisions[mid] = Number(el.dataset.index);
    return render();
  }
  if(action === 'reveal') {
    const mid = el.dataset.mid;
    if(state.decisions[mid] !== undefined) state.revealed[mid] = true;
    return render();
  }
  if(action === 'quiz') {
    if(!state.quizDone) state.quiz[el.dataset.qid] = Number(el.dataset.index);
    return render();
  }
  if(action === 'submit-quiz') {
    if(DATA.QUIZ_DATA.every(q => state.quiz[q.id] !== undefined)) state.quizDone = true;
    return render();
  }
});

render();

</script>
</body>
</html>
