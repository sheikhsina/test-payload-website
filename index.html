}

function RoleNote({ notes, roleId }) {
  const role = ROLES.find(r => r.id === roleId);
  if (!role) return null;
  return (
    <div style={{ display:'flex', gap:10, padding:'12px 14px', background:`rgba(${role.id==='analyst'?'96,165,250':role.id==='procurement'?'167,139,250':role.id==='vendorData'?'52,211,153':role.id==='finance'?'245,166,35':'248,113,113'},0.07)`, border:`1px solid rgba(${role.id==='analyst'?'96,165,250':role.id==='procurement'?'167,139,250':role.id==='vendorData'?'52,211,153':role.id==='finance'?'245,166,35':'248,113,113'},0.2)`, borderRadius:8, marginBottom:24 }}>
      <div style={{ minWidth:32, height:32, borderRadius:6, background:role.color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, fontWeight:800, color:'#0C1220', flexShrink:0 }}>{role.abbr}</div>
      <p style={{ fontSize:13.5, color:T.txtMid, lineHeight:1.6 }}><strong style={{ color:role.color, fontWeight:600 }}>{role.label}:</strong> {notes[roleId]}</p>
    </div>
  );
}

function Checkpoint({ decision, mid, decisions, setDecisions, revealed, setRevealed }) {
  const sel = decisions[mid];
  const done = revealed[mid];
  const selOpt = decision.options.find(o => o.label === sel);

  return (
    <div>
      <div style={{ background:T.acBg, border:`1px solid ${T.acBd}`, borderRadius:10, padding:'14px 16px', marginBottom:18 }}>
        <div style={{ fontSize:10, color:T.accent, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:8 }}>Decision Checkpoint</div>
        <p style={{ fontSize:14.5, color:T.txt, lineHeight:1.6, fontStyle:'italic' }}>{decision.prompt}</p>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:14 }}>
        {decision.options.map(opt => {
          let bd = T.border, bg = T.surfHi;
          if (sel === opt.label && !done) { bd = T.accent; bg = T.acBg; }
          if (done && opt.isCorrect) { bd = T.ok; bg = T.okBg; }
          if (done && sel === opt.label && !opt.isCorrect) { bd = T.err; bg = T.errBg; }
          return (
            <button key={opt.label} onClick={() => !done && setDecisions(p => ({...p,[mid]:opt.label}))} disabled={done}
              style={{ display:'flex', alignItems:'flex-start', gap:12, padding:'12px 14px', borderRadius:8, border:`1.5px solid ${bd}`, background:bg, cursor:done?'default':'pointer', textAlign:'left', transition:'all 0.18s', fontFamily:"'DM Sans',sans-serif" }}>
              <span style={{ minWidth:22, height:22, borderRadius:'50%', border:`1.5px solid ${bd}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700, color: done&&opt.isCorrect ? '#0C1220' : done&&sel===opt.label ? '#0C1220' : T.txtLo, background: done&&opt.isCorrect ? T.ok : done&&sel===opt.label&&!opt.isCorrect ? T.err : 'transparent', flexShrink:0 }}>{opt.label}</span>
              <span style={{ fontSize:13.5, color:T.txt, lineHeight:1.55 }}>{opt.text}</span>
            </button>
          );
        })}
      </div>
      {!done && (
        <button onClick={() => sel && setRevealed(p => ({...p,[mid]:true}))} disabled={!sel}
          style={{ padding:'9px 20px', borderRadius:6, border:'none', background:sel?T.accent:T.border, color:sel?'#0C1220':T.txtLo, fontWeight:700, fontSize:13, cursor:sel?'pointer':'not-allowed', fontFamily:"'DM Sans',sans-serif", transition:'all 0.18s' }}>
          Check Answer
        </button>
      )}
      {done && (
        <div style={{ marginTop:14, padding:'14px 16px', background:selOpt?.isCorrect?T.okBg:T.errBg, border:`1px solid ${selOpt?.isCorrect?T.okBd:T.errBd}`, borderRadius:8 }}>
          <div style={{ fontSize:12, fontWeight:700, marginBottom:8, color:selOpt?.isCorrect?T.ok:T.err }}>{selOpt?.isCorrect?'✓ Correct':'✗ Not quite'}</div>
          <p style={{ fontSize:13.5, color:T.txtMid, lineHeight:1.6, marginBottom:10 }}>{selOpt?.explanation}</p>
          <div style={{ paddingTop:10, borderTop:`1px solid ${selOpt?.isCorrect?T.okBd:T.errBd}` }}>
            <span style={{ fontSize:12, color:selOpt?.isCorrect?T.ok:T.err, fontWeight:600 }}>Key principle: </span>
            <span style={{ fontSize:13, color:T.txtMid }}>{decision.correctNote}</span>
          </div>
        </div>
      )}
    </div>
  );
}

function WhatChanges({ text }) {
  return (
    <div style={{ marginTop:28, borderLeft:`3px solid ${T.accent}`, paddingLeft:16, paddingTop:4, paddingBottom:4 }}>
      <div style={{ fontSize:10, color:T.accent, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:6 }}>What changes here</div>
      <p style={{ fontSize:14, color:T.txtMid, lineHeight:1.65 }}>{text}</p>
    </div>
  );
}

function ModuleScreen({ roleId, currentMod, setCurrentMod, decisions, setDecisions, revealed, setRevealed }) {
  const mod = MODS[currentMod];
  const role = ROLES.find(r => r.id === roleId);
  const allDone = MODS.every(m => revealed[m.id]);
  const canNext = revealed[mod.id];

  return (
    <div style={{ display:'flex', minHeight:'100vh', background:T.bg, fontFamily:"'DM Sans',sans-serif" }}>
      <style>{FONTS}</style>

      {/* Sidebar */}
      <aside style={{ width:230, background:T.surface, borderRight:`1px solid ${T.border}`, display:'flex', flexDirection:'column', padding:'0', flexShrink:0, position:'sticky', top:0, height:'100vh', overflowY:'auto' }}>
        <div style={{ padding:'20px 16px 16px', borderBottom:`1px solid ${T.border}` }}>
          <div style={{ fontSize:9, color:T.accent, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:4 }}>Group 2 Lab</div>

        </div>
        <div style={{ padding:'12px 10px', borderBottom:`1px solid ${T.border}` }}>

            <span style={{ fontSize:11.5, color:T.txtMid }}>{role.label}</span>
          </div>
        </div>
        <nav style={{ flex:1, padding:'8px 0' }}>
          {MODS.map((m, i) => {
            const done = revealed[m.id];
            const active = currentMod === i;
            return (
              <button key={m.id} onClick={() => setCurrentMod(i)}
                style={{ display:'flex', alignItems:'center', gap:10, width:'100%', padding:'10px 14px', background:active ? T.acBg : 'transparent', borderLeft:active ? `2px solid ${T.accent}` : '2px solid transparent', border:'none', cursor:'pointer', textAlign:'left', transition:'all 0.15s', fontFamily:"'DM Sans',sans-serif" }}>
                <span style={{ width:18, height:18, borderRadius:'50%', border:`1.5px solid ${done ? T.ok : active ? T.accent : T.border}`, background:done ? T.ok : 'transparent', display:'flex', alignItems:'center', justifyContent:'center', fontSize:9, color:done ? '#0C1220' : active ? T.accent : T.txtLo, flexShrink:0, fontWeight:700 }}>
                  {done ? '✓' : i + 1}
                </span>
                <div>
                  <div style={{ fontSize:9, color:active ? T.accent : T.txtLo, letterSpacing:'0.05em', textTransform:'uppercase', marginBottom:1 }}>{m.act}</div>
                  <div style={{ fontSize:11.5, color:active ? T.txt : T.txtMid, lineHeight:1.3 }}>{m.title}</div>
                </div>
              </button>
            );
          })}
          <button onClick={() => allDone && setCurrentMod('debrief')}
            style={{ display:'flex', alignItems:'center', gap:10, width:'100%', padding:'10px 14px', background:currentMod==='debrief' ? T.acBg : 'transparent', borderLeft:currentMod==='debrief' ? `2px solid ${T.accent}` : '2px solid transparent', border:'none', cursor:allDone?'pointer':'not-allowed', textAlign:'left', opacity:allDone?1:0.4, fontFamily:"'DM Sans',sans-serif" }}>
            <span style={{ width:18, height:18, borderRadius:'50%', border:`1.5px solid ${allDone ? T.accent : T.border}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:9, color:allDone ? T.accent : T.txtLo, flexShrink:0 }}>→</span>

          <div style={{ fontSize:11, color:T.txtLo, marginTop:6 }}>{Object.keys(revealed).length} of 6 completed</div>

      </aside>

      {/* Content */}
      <main style={{ flex:1, overflowY:'auto', padding:'40px 48px', maxWidth:760 }}>

              <button onClick={() => setCurrentMod('debrief')}
                style={{ padding:'10px 24px', borderRadius:6, border:'none', background:T.accent, color:'#0C1220', fontWeight:700, fontSize:13, cursor:'pointer', fontFamily:"'DM Sans',sans-serif" }}>
                Go to Debrief →
              </button>
            ) : (
              <button onClick={() => setCurrentMod(currentMod + 1)}
                style={{ padding:'10px 24px', borderRadius:6, border:'none', background:T.accent, color:'#0C1220', fontWeight:700, fontSize:13, cursor:'pointer', fontFamily:"'DM Sans',sans-serif" }}>
                Next Module →
              </button>
            )}
          </div>
        )}
      </main>
    </div>
  );
}

// ─── DEBRIEF SCREEN ───────────────────────────────────────────────────────────

function Debrief({ roleId, setCurrentMod }) {
  const [quiz, setQuiz] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const role = ROLES.find(r => r.id === roleId);
  const deb = DEBRIEF[roleId];
  const allAnswered = QUIZ_DATA.every(q => quiz[q.id] !== undefined);
  const score = submitted ? QUIZ_DATA.filter(q => QUIZ_DATA[q.id]?.opts?.[quiz[q.id]]?.correct || quiz[q.id] === QUIZ_DATA.find(qd=>qd.id===q.id)?.opts?.findIndex(o=>o.correct)).length : 0;

  const getScore = () => {
    let s = 0;
    QUIZ_DATA.forEach(q => { if (q.opts[quiz[q.id]]?.correct) s++; });
    return s;
  };

  return (
    <div style={{ display:'flex', minHeight:'100vh', background:T.bg, fontFamily:"'DM Sans',sans-serif" }}>
      <style>{FONTS}</style>
      <aside style={{ width:230, background:T.surface, borderRight:`1px solid ${T.border}`, flexShrink:0, padding:'20px 14px', display:'flex', flexDirection:'column', gap:10, position:'sticky', top:0, height:'100vh' }}>
        <div style={{ fontSize:9, color:T.accent, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:4 }}>Group 2 Lab</div>
        <div style={{ fontSize:12, color:T.txtMid, lineHeight:1.4, marginBottom:12 }}>Process Complete Is Not Authentication</div>
        {MODS.map((m, i) => (
          <button key={m.id} onClick={() => setCurrentMod(i)}
            style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 10px', borderRadius:6, border:`1px solid ${T.border}`, background:T.surfHi, cursor:'pointer', textAlign:'left', fontFamily:"'DM Sans',sans-serif" }}>
            <span style={{ width:16, height:16, borderRadius:'50%', background:T.ok, display:'flex', alignItems:'center', justifyContent:'center', fontSize:9, color:'#0C1220', fontWeight:700 }}>✓</span>
            <span style={{ fontSize:11, color:T.txtMid }}>{m.title}</span>
          </button>
        ))}
      </aside>

      <main style={{ flex:1, overflowY:'auto', padding:'40px 48px', maxWidth:760 }}>
        <div style={{ marginBottom:6 }}><Pill color={role.color} bg={`rgba(${roleId==='analyst'?'96,165,250':roleId==='procurement'?'167,139,250':roleId==='vendorData'?'52,211,153':roleId==='finance'?'245,166,35':'248,113,113'},0.1)`} bd={`rgba(${roleId==='analyst'?'96,165,250':roleId==='procurement'?'167,139,250':roleId==='vendorData'?'52,211,153':roleId==='finance'?'245,166,35':'248,113,113'},0.25)`}>Debrief — {role.label}</Pill></div>
        <h2 style={{ fontFamily:"'Syne',sans-serif", fontSize:28, fontWeight:800, color:T.txt, marginBottom:6, marginTop:10 }}>Your Role, Rewritten</h2>
        <p style={{ fontSize:14, color:T.txtLo, marginBottom:28, fontStyle:'italic' }}>The before. The after. The principle that connects them.</p>

        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:28 }}>
          <div style={{ padding:'16px 18px', background:T.errBg, border:`1px solid ${T.errBd}`, borderRadius:10 }}>
            <div style={{ fontSize:10, color:T.err, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:8 }}>Status A — what happened</div>
            <p style={{ fontSize:13.5, color:T.txtMid, lineHeight:1.65 }}>{deb.before}</p>
          </div>
          <div style={{ padding:'16px 18px', background:T.okBg, border:`1px solid ${T.okBd}`, borderRadius:10 }}>
            <div style={{ fontSize:10, color:T.ok, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:8 }}>Status B — new practice</div>
            <p style={{ fontSize:13.5, color:T.txtMid, lineHeight:1.65 }}>{deb.after}</p>
          </div>
        </div>

        <div style={{ borderLeft:`3px solid ${role.color}`, paddingLeft:16, marginBottom:36 }}>
          <div style={{ fontSize:10, color:role.color, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:6 }}>Your key principle</div>
          <p style={{ fontSize:15, color:T.txt, lineHeight:1.6, fontWeight:500 }}>{deb.key}</p>
        </div>

        <div style={{ borderTop:`1px solid ${T.border}`, paddingTop:28, marginBottom:24 }}>
          <h3 style={{ fontFamily:"'Syne',sans-serif", fontSize:20, fontWeight:700, color:T.txt, marginBottom:6 }}>Final Assessment</h3>
          <p style={{ fontSize:13.5, color:T.txtLo, marginBottom:24 }}>5 questions. Testing behaviour, not memorisation.</p>

          {QUIZ_DATA.map((q, qi) => (
            <div key={q.id} style={{ marginBottom:22, padding:'16px 18px', background:T.surface, border:`1px solid ${submitted && (q.opts[quiz[q.id]]?.correct ? T.okBd : T.errBd) || T.border}`, borderRadius:10 }}>
              <p style={{ fontSize:14, color:T.txt, fontWeight:500, lineHeight:1.55, marginBottom:12 }}><span style={{ color:T.accent, fontWeight:700, marginRight:6 }}>{qi+1}.</span>{q.q}</p>
              {q.opts.map((opt, oi) => {
                let bd = T.border, bg = T.surfHi, tc = T.txtMid;
                if (quiz[q.id] === oi && !submitted) { bd = T.accent; bg = T.acBg; tc = T.txt; }
                if (submitted && opt.correct) { bd = T.ok; bg = T.okBg; tc = T.ok; }
                if (submitted && quiz[q.id] === oi && !opt.correct) { bd = T.err; bg = T.errBg; tc = T.err; }
                return (
                  <button key={oi} onClick={() => !submitted && setQuiz(p => ({...p,[q.id]:oi}))}
                    style={{ display:'block', width:'100%', padding:'9px 12px', marginBottom:6, borderRadius:6, border:`1.5px solid ${bd}`, background:bg, cursor:submitted?'default':'pointer', textAlign:'left', color:tc, fontSize:13, lineHeight:1.5, transition:'all 0.15s', fontFamily:"'DM Sans',sans-serif" }}>
                    {opt.t}
                  </button>
                );
              })}
              {submitted && (
                <p style={{ fontSize:12.5, color:T.txtMid, marginTop:10, paddingTop:10, borderTop:`1px solid ${T.border}`, lineHeight:1.6, fontStyle:'italic' }}>{q.exp}</p>
              )}
            </div>
          ))}

          {!submitted ? (
            <button onClick={() => allAnswered && setSubmitted(true)} disabled={!allAnswered}
              style={{ padding:'11px 28px', borderRadius:6, border:'none', background:allAnswered ? T.accent : T.border, color:allAnswered ? '#0C1220' : T.txtLo, fontWeight:700, fontSize:14, cursor:allAnswered?'pointer':'not-allowed', fontFamily:"'DM Sans',sans-serif" }}>
              Submit Assessment
            </button>
          ) : (
            <div style={{ padding:'18px 20px', background:getScore()>=4?T.okBg:T.acBg, border:`1px solid ${getScore()>=4?T.okBd:T.acBd}`, borderRadius:10 }}>
              <div style={{ fontFamily:"'Syne',sans-serif", fontSize:22, fontWeight:800, color:getScore()>=4?T.ok:T.accent, marginBottom:6 }}>{getScore()} / 5</div>
              <p style={{ fontSize:13.5, color:T.txtMid, lineHeight:1.6 }}>
                {getScore()===5 ? 'Full marks. You have understood the key shift: process completion is not the same as authentication.' :
                 getScore()>=4 ? 'Strong result. Review the explanation on any questions you missed.' :
                 'Worth revisiting the modules where you are less confident. The core principle is worth making instinctive.'}
              </p>
            </div>
          )}
        </div>
      </main>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────

function App() {
  const [roleId, setRoleId] = useState(null);
  const [currentMod, setCurrentMod] = useState(0);
  const [decisions, setDecisions] = useState({});
  const [revealed, setRevealed] = useState({});

  if (!roleId) return <Welcome setRole={(id) => { setRoleId(id); setCurrentMod(0); }} />;
  if (currentMod === 'debrief') return <Debrief roleId={roleId} setCurrentMod={setCurrentMod} />;
  return <ModuleScreen roleId={roleId} currentMod={currentMod} setCurrentMod={setCurrentMod} decisions={decisions} setDecisions={setDecisions} revealed={revealed} setRevealed={setRevealed} />;
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
